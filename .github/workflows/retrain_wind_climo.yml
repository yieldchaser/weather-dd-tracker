name: System 5 - Retrain Wind Climatology

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-wind-climo-retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas requests
          
      - name: Retrain Climatology
        run: |
          rm -f outputs/wind/wind_climo_30d.json
          python scripts/wind/forecast_wind_power.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/wind/wind_climo_30d.json
          git diff --staged --quiet || (git commit -m "Auto-update: Wind Climatology $(date '+%Y-%m-%dT%H:%M:%SZ')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
