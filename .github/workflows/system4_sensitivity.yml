name: System 4 - Weather Sensitivity Coefficient

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-sensitivity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests statsmodels
          
      - name: Run System 4
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/sensitivity/system4_sensitivity.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/sensitivity/
          git diff --staged --quiet || (git commit -m "Auto-update: Weather Sensitivity state $(date '+%Y-%m-%dT%H:%M:%SZ')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
