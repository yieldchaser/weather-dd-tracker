name: Master Weather Composite Signal

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-composite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy
          
      - name: Run Master Integration
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/compute_composite_weather_signal.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/composite_signal.json
          git diff --staged --quiet || (git commit -m "Auto-update: Master Weather Signal $(date '+%Y-%m-%dT%H:%M:%SZ')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
