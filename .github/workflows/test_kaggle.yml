name: Test Kaggle Integration

on:
  workflow_dispatch:

jobs:
  test-kaggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install kaggle CLI
        run: pip install kaggle -q

      - name: Kaggle Auth Diagnostic
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "--- Kaggle Diagnostic ---"
          kaggle --version
          echo "KAGGLE_USERNAME=${KAGGLE_USERNAME:-(NOT SET)}"
          echo "KAGGLE_KEY length: ${#KAGGLE_KEY}"
          echo ""
          echo "--- Testing kernels list ---"
          kaggle kernels list --mine --page-size 3 2>&1
          echo ""
          echo "--- Testing kernel status ---"
          kaggle kernels status prateekriders/weather-dd-ai-inference 2>&1
          echo "--- Done ---"

      - name: Push Kaggle Kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle kernels push -p scripts/kaggle_env
          echo "Kernel push succeeded!"

      - name: Poll Kaggle until kernel completes
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          CONSEC_FAIL=0
          for i in $(seq 1 45); do
            STATUS=$(kaggle kernels status prateekriders/weather-dd-ai-inference 2>&1) && EXIT_CODE=0 || EXIT_CODE=$?
            echo "[$i/45] (exit=$EXIT_CODE) $STATUS"

            if [[ $EXIT_CODE -ne 0 || "$STATUS" == *"Server Error"* || "$STATUS" == *"Connection aborted"* ]]; then
              CONSEC_FAIL=$((CONSEC_FAIL + 1))
              echo "[WARN] API error (consecutive: $CONSEC_FAIL/5)"
              if [[ $CONSEC_FAIL -ge 5 ]]; then
                echo "[FATAL] 5 consecutive failures. Aborting."
                exit 1
              fi
            else
              CONSEC_FAIL=0
              echo "$STATUS" | grep -q "COMPLETE" && echo "Kernel complete!" && exit 0
              echo "$STATUS" | grep -q "ERROR" && echo "Kernel errored!" && exit 1
            fi
            sleep 60
          done
          echo "Timed out after 45 min"
          exit 1

      - name: Download Kaggle kernel output
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p /tmp/kaggle_out
          kaggle kernels output prateekriders/weather-dd-ai-inference -p /tmp/kaggle_out
          echo "Downloaded files:"
          ls -la /tmp/kaggle_out/
          echo ""
          echo "CSV files:"
          find /tmp/kaggle_out -name "*.csv" | head -20
          echo ""
          echo "SUCCESS: Kaggle integration verified!"
