name: System 2 - Weather Regime Classifier

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-regimes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install system dependencies (libeccodes ≥2.46.0 for ECMWF 50r1 support)
        run: |
          # Ubuntu 22.04 default repo only has 2.24.2-1, need PPA for >=2.46.0
          curl -fsSL https://patrick-zippenfenig.github.io/ecCodes-ubuntu/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/eccodes.gpg
          echo "deb [signed-by=/usr/share/keyrings/eccodes.gpg] https://patrick-zippenfenig.github.io/ecCodes-ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/eccodes.list
          sudo apt-get update -qq
          sudo apt-get install -y libeccodes-dev
          pkg-config --modversion libeccodes || echo "libeccodes installed via PPA"
          
      - name: Install python dependencies
        run: |
          pip install xarray pandas numpy scikit-learn herbie-data eccodes cfgrib requests
          
      - name: Run System 2
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/regimes/classify_today.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/regimes/ outputs/health/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update: Weather Regime state $(date '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && echo "Push succeeded" && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
