name: Real-Time Model Poller

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4,10,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    
    # Prevent overlapping poller runs
    concurrency:
      group: weather-poller
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (libeccodes ≥2.46.0 for ECMWF 50r1 support)
        run: |
          # Try PPA first (faster), fallback to source build if PPA fails
          echo "Attempting ecCodes-ubuntu PPA installation..."
          (
            curl -fsSL https://patrick-zippenfenig.github.io/ecCodes-ubuntu/key.gpg 2>/dev/null | sudo gpg --dearmor -o /usr/share/keyrings/eccodes.gpg 2>/dev/null && \
            echo "deb [signed-by=/usr/share/keyrings/eccodes.gpg] https://patrick-zippenfenig.github.io/ecCodes-ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/eccodes.list >/dev/null && \
            sudo apt-get update -qq && \
            sudo apt-get install -y libeccodes-dev && \
            echo "✅ ecCodes installed via PPA"
          ) || {
            echo "⚠️  PPA failed, building ecCodes 2.46.0 from source..."
            sudo apt-get update -qq
            sudo apt-get install -y cmake libaec-dev libjpeg-dev libpng-dev zlib1g-dev
            cd /tmp
            wget -q https://github.com/ecmwf/eccodes/archive/refs/tags/2.46.0.tar.gz -O eccodes.tar.gz
            tar -xzf eccodes.tar.gz
            cd eccodes-2.46.0
            mkdir build && cd build
            cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_PYTHON=OFF -DENABLE_TESTS=OFF >/dev/null 2>&1
            make -j$(nproc) >/dev/null 2>&1
            sudo make install >/dev/null 2>&1
            sudo ldconfig
            echo "✅ ecCodes built and installed from source"
            cd /
          }
          pkg-config --modversion libeccodes 2>/dev/null || echo "libeccodes installed"

      - name: Install Python dependencies
        run: |
          pip install --upgrade -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/ecmwf
          mkdir -p data/gfs
          mkdir -p data/normals
          mkdir -p data/open_meteo
          mkdir -p data/weights
          mkdir -p outputs/maps

      - name: Copy normals file
        run: |
          cp data/us_daily_normals.csv data/normals/us_daily_normals.csv || true

      - name: Run Model Poller
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: |
          python scripts/market_logic/fetch_live_grid.py
          python scripts/poll_models.py
          python scripts/generate_maps.py || echo "[WARN] Map generation failed."
          python scripts/market_logic/fetch_gas_burn_history.py
          python scripts/market_logic/fetch_thermal_history.py
          python scripts/market_logic/fetch_outages.py
          python scripts/market_logic/fetch_peaker_proxy.py

      - name: Trigger Kaggle AI Inference Kernel (00z/12z Major Cycles Only)
        if: env.NEW_DATA_FOUND == 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC Hour: $HOUR"
          
          # Only trigger heavy Kaggle inference between 03-09z (GFS/ECMWF 00z cycle completion)
          # OR between 15-21z (GFS/ECMWF 12z cycle completion).
          # This prevents HRRR/NAM hourly micro-updates from spamming GPU compute.
          if [[ ( $HOUR -ge 3 && $HOUR -le 9 ) || ( $HOUR -ge 15 && $HOUR -le 21 ) ]]; then
             echo "Major cycle window detected. Triggering Kaggle AI models..."
             pip install kaggle -q
             kaggle kernels push -p scripts/kaggle_env || echo "[INFO] Kernel already up-to-date"
             echo "Kernel triggered. Waiting for completion..."
             echo "RUN_KAGGLE=true" >> $GITHUB_ENV
          else
             echo "Minor cycle window. Skipping AI Inference to save Kaggle quotas."
             echo "RUN_KAGGLE=false" >> $GITHUB_ENV
          fi

      - name: Poll Kaggle until kernel completes
        if: env.RUN_KAGGLE == 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(kaggle kernels status prateekriders/weather-dd-ai-inference 2>&1)
            echo "[$i/60] $STATUS"
            echo "$STATUS" | grep -q "COMPLETE" && echo "Kernel complete!" && exit 0
            echo "$STATUS" | grep -q "ERROR" && echo "Kernel errored!" && exit 1
            sleep 60
          done
          echo "[WARN] Timed out waiting for kernel (60 min max)"

      - name: Download Kaggle kernel output
        if: env.RUN_KAGGLE == 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p data/ai_models
          kaggle kernels output prateekriders/weather-dd-ai-inference -p /tmp/kaggle_out
          # CSVs are saved to /kaggle/working/output/ inside the kernel
          find /tmp/kaggle_out -name "*.csv" -exec cp {} data/ai_models/ \;
          echo "Downloaded files:"
          ls -la data/ai_models/ || true

      - name: Run Repo Cleanup
        if: env.NEW_DATA_FOUND == 'true'
        run: |
          python scripts/cleanup_repo.py
          echo "Final storage check:"
          du -sh outputs/maps/ data/gefs_subseasonal/

      - name: Commit pipeline state and AI model results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/pipeline_state.json outputs/ outputs/health/ data/ecmwf/ data/gfs/ data/ecmwf_aifs/ data/ecmwf_ens/ data/ai_models/ data/weights/ data/normals/ || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update: Pipeline state & metrics $(date '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && echo "Push succeeded" && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
