name: System 1 - Teleconnections

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-teleconnections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pandas numpy
      - name: Run System 1
        run: python scripts/teleconnections/system1_teleconnections.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/teleconnections/
          git diff --staged --quiet || (git commit -m "Auto-update: Teleconnections state $(date '+%Y-%m-%dT%H:%M:%SZ')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
