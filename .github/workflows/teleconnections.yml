name: System 1 - Teleconnections Dashboard

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-teleconnections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests
          
      - name: Run System 1
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/teleconnections/system1_teleconnections.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/teleconnections/ outputs/health/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update: Teleconnections state $(date '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && echo "Push succeeded" && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
