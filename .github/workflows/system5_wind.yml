name: System 5 - Wind Drought Tracker

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-wind-drought:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests
          
      - name: Run System 5
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/wind/forecast_wind_power.py
        
      - name: Run Solar Power Forecast
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/wind/forecast_solar_power.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/wind/wind_power_forecast.csv outputs/wind/drought.json outputs/wind/wind_climo_30d.json outputs/wind/solar_power_forecast.csv outputs/wind/solar_climo_30d.json outputs/wind/combined_drought.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update: Wind Forecast $(date '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && echo "Push succeeded" && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
