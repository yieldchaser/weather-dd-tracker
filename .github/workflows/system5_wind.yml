name: System 5 - Wind Drought Tracker

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-wind-drought:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install pandas numpy requests
          
      - name: Run System 5
        env:
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: python scripts/wind/drought_tracker.py
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add outputs/wind/
          git diff --staged --quiet || (git commit -m "Auto-update: Wind Drought state $(date '+%Y-%m-%dT%H:%M:%SZ')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
